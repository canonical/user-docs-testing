# docs-testing.config.example.yml
#
# Example configuration for the documentation testing tool.
#
# Copy this into your repository as `docs-testing.config.yml` and adapt it. The
# workflow reads this file to decide which tests to run, what to compare against,
# and how to report.
#
# Model:
#   - The tool ships tests. You pick which ones to run here, point them at your
#     docs, and choose how to report.
#   - Each test is `agentic` (a review by an AI engine) or `deterministic` (a
#     command that emits findings in the schema in RESULTS-SCHEMA.md).
#   - You can also add your own tests, most often deterministic ones that are
#     specific to your project.
#
# How shipped tests reach a run:
#   - Agentic tests are imported by your workflow at compile time (see the
#     `imports:` block in workflows/docs-testing.md). This config supplies their
#     targets, sources, and reporting; the workflow supplies the instructions.
#   - Shipped deterministic scripts come from checking out the (public) tool repo
#     in your workflow (the optional `.user-docs-testing` checkout).

version: 1

# ---------------------------------------------------------------------------
# Sources of truth some tests compare documentation against.
# Referenced by tests via their `name`. `auth` names a SECRET holding a read
# token — the secret lives in GitHub, never in this file. This SOURCE token is
# separate from the engine token (how the AI agent authenticates); it only lets
# `actions/checkout` read a PRIVATE source. Give it Contents: Read. A personal
# fine-grained PAT has a single owner, so a private source in another org needs
# its own org-owned secret. Omit `auth` for public repos. A test that needs no
# source of truth can omit `sources` entirely. See README.md "Engines and tokens".
# ---------------------------------------------------------------------------
sources:
  - name: product           # example name — reference this from a test
    repo: my-org/my-product # example — replace with your repo
    ref: main               # pin to a tag/commit for reproducible runs
    paths:                  # only these paths are relevant
      - "**"
    auth: secret:PRODUCT_REPO_TOKEN   # omit for public repos

# ---------------------------------------------------------------------------
# Reporting. Findings from all tests are summarized together.
#   check-run - GitHub Check Run with a pass/fail conclusion (CI-gating). Default.
#   issue     - open a GitHub issue summarizing findings.
#   both      - do both.
# ---------------------------------------------------------------------------
reporting:
  mode: check-run
  fail_on_findings: true          # set false to report without failing CI
  title: "Docs testing"
  labels:
    - "docs-testing"

# ---------------------------------------------------------------------------
# Tests to run. Add as many as you like; each is independent.
# ---------------------------------------------------------------------------
tests:
  # --- A shipped agentic test -----------------------------------------------
  # Its instructions come from importing the matching test in your workflow:
  #   imports:
  #     - canonical/user-docs-testing/tests/agentic/reference-review.md@v1
  # `name` must match the imported test. This entry supplies its parameters.
  - name: reference-review
    type: agentic
    # AI engine for this test: copilot | claude | codex | gemini. Must match the
    # `engine:` in your workflow, whose matching secret authenticates the agent.
    engine: copilot
    # Documentation this test covers.
    targets:
      - "reference/**/*.md"
    exclude:
      - "reference/legacy/**"
    # Which sources of truth (by name) this test compares against.
    sources:
      - product
    # How to treat auto-generated material within the targets:
    #   skip               - ignore it entirely
    #   annotate           - review it, but label findings as generated
    #   deterministic-only - only deterministic tests may cover it
    generated:
      paths:
        - "reference/api/**"
      mode: skip
    # Skip anything already reported by a deterministic test, to avoid duplicates.
    skip_deterministically_covered: true

  # --- A shipped deterministic test -----------------------------------------
  # Uses a script from the tool repo, so your workflow must check it out (the
  # optional `.user-docs-testing` checkout) and enable the deterministic steps.
  - name: reference-links
    type: deterministic
    command: "python .user-docs-testing/tests/deterministic/broken_links.py --targets 'reference/**/*.md' --output results/reference-links.json"
    results_file: "results/reference-links.json"

  # --- Your own deterministic test ------------------------------------------
  # Any command, in any language, that writes the schema in RESULTS-SCHEMA.md.
  # Runs on the CI runner; the tool does not manage your project's environment.
  # Use `setup` for any commands needed to prepare THIS test.
  # - name: commands-documented
  #   type: deterministic
  #   command: "python scripts/check_commands.py --output results/commands.json"
  #   results_file: "results/commands.json"
  #   setup:
  #     - "pip install -r scripts/requirements.txt"

